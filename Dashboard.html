<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKC Developmental Commission</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#1a237e,#0d1b4a);min-height:100vh}
.navbar{background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.1);position:sticky;top:0;z-index:100}
.nav-container{max-width:1400px;margin:0 auto;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.logo h2{color:#1a237e;font-size:16px}.logo p{color:#666;font-size:10px}
.nav-links{display:flex;gap:5px;flex-wrap:wrap}
.nav-btn{padding:8px 16px;background:0 0;border:0;cursor:pointer;font-size:13px;color:#666;border-radius:8px;transition:.3s;white-space:nowrap}
.nav-btn:hover{background:#f0f0f0}.nav-btn.active{background:#1a237e;color:#fff}
.nav-actions{display:flex;gap:8px;align-items:center}
.view-sheet-btn{background:#ff9800;color:#fff;border:0;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px}
.refresh-btn{background:#4caf50;color:#fff;border:0;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px}
.container{max-width:1400px;margin:0 auto;padding:20px}
.page{display:none;animation:fadeIn .3s}.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:.2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-title{color:#666;font-size:11px;text-transform:uppercase;margin-bottom:8px;letter-spacing:.5px;font-weight:600}
.stat-value{color:#1a237e;font-size:28px;font-weight:700;margin-bottom:5px}
.stat-sub{color:#999;font-size:11px}
.table-container{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;overflow-x:auto;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.table-title{font-size:16px;font-weight:600;color:#1a237e;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #1a237e;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1a237e;color:#fff;padding:10px 12px;text-align:left;white-space:nowrap;font-weight:600}
td{padding:10px 12px;border-bottom:1px solid #e0e0e0;vertical-align:middle}
tr:hover{background:#f5f5f5}tr:last-child td{border-bottom:none}
.status-badge{display:inline-block;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.status-mid-term{background:#2196f3;color:#fff}
.status-terminal-report{background:#4caf50;color:#fff}
.status-expired{background:#f44336;color:#fff}
.status-on-the-way{background:#ff9800;color:#fff}
.status-active{background:#4caf50;color:#fff}
.status-inactive{background:#f44336;color:#fff}
.status-no-dates,.status-no-signed-date{background:#9e9e9e;color:#fff}
.expired-row{background-color:#fff5f5!important}.expired-row:hover{background-color:#ffe0e0!important}
.expired-text{color:#f44336;font-weight:600}
.et-color-dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:6px;vertical-align:middle}
.email-link{color:#1a237e;text-decoration:none;font-size:12px}.email-link:hover{text-decoration:underline}
.phone-text{color:#333;font-size:12px;white-space:nowrap}
.duration-text{font-size:12px;color:#666;white-space:nowrap}
.progress-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;min-width:60px}
.progress-fill{height:100%;background:linear-gradient(90deg,#1a237e,#4caf50);border-radius:4px;transition:.3s}
.total-row{background:#f0f0ff!important;font-weight:700}.total-row td{border-top:2px solid #1a237e;font-size:14px}
.filter-bar{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
.search-input{padding:8px 12px;border:1px solid #ddd;border-radius:6px;flex:1;min-width:200px;font-size:13px}
.filter-select{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff}
.loading{text-align:center;padding:50px;background:#fff;border-radius:12px}
.spinner{border:3px solid #f3f3f3;border-top:3px solid #1a237e;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.error-message{background:#ffebee;color:#c62828;padding:30px;border-radius:12px;text-align:center}
.empty-state{text-align:center;padding:40px;color:#999}
.btn{background:#1a237e;color:#fff;border:0;padding:10px 20px;border-radius:6px;cursor:pointer;margin-top:15px;font-size:13px}
.last-updated{text-align:center;font-size:11px;color:#999;margin-top:10px;padding:10px;background:#fff;border-radius:8px}
.text-blue{color:#2196f3;font-weight:600}
.text-green{color:#4caf50;font-weight:600}
.text-red{color:#f44336;font-weight:600}
.text-orange{color:#ff9800;font-weight:600}
.legend-box{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:10px;font-size:12px;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px}
@media(max-width:768px){.nav-container{flex-direction:column}.stat-value{font-size:20px}th,td{padding:8px;font-size:11px}}
</style>
</head>
<body>
<div class="navbar">
<div class="nav-container">
<div class="logo"><h2>⛪ MESERETE KIRISTOS CHURCH</h2><p>Developmental Commission</p></div>
<div class="nav-links">
<button class="nav-btn active" onclick="showPage('home')">🏠 Home</button>
<button class="nav-btn" onclick="showPage('employees')">👥 Employees</button>
<button class="nav-btn" onclick="showPage('projects')">📋 Projects</button>
<button class="nav-btn" onclick="showPage('regions')">🗺️ Regions</button>
<button class="nav-btn" onclick="showPage('reports')">📊 Reports</button>
</div>
<div class="nav-actions">
<button class="view-sheet-btn" onclick="viewSheet()">📝 View Sheet</button>
<button class="refresh-btn" onclick="refreshData()">🔄 Refresh</button>
</div>
</div>
</div>
<div class="container" id="app"><div class="loading"><div class="spinner"></div><p>Loading Dashboard...</p></div></div>

<script>
let dashboardData=null,currentPage='home';
window.addEventListener('load',()=>loadDashboardData());
function loadDashboardData(){showLoading('Loading...');google.script.run.withSuccessHandler(data=>{dashboardData=data;data&&data.success?renderAllPages():showError(data?data.error:'Unknown error')}).withFailureHandler(e=>showError(e.message||'Failed')).getDashboardData()}
function refreshData(){loadDashboardData()}
function viewSheet(){google.script.run.withSuccessHandler(u=>u?window.open(u,'_blank'):alert('No URL')).getSheetUrl()}
function showLoading(m){document.getElementById('app').innerHTML='<div class="loading"><div class="spinner"></div><p>'+m+'</p></div>'}
function showError(m){document.getElementById('app').innerHTML='<div class="error-message"><strong>⚠️ Error</strong><br><br>'+m+'<br><br><small>Run <b>setupDashboard()</b> first.</small><br><br><button class="btn" onclick="refreshData()">🔄 Retry</button></div>'}
function getStatusClass(s){if(!s)return'';return'status-'+s.toLowerCase().replace(/\s+/g,'-')}
function renderAllPages(){const e=dashboardData.employees||{},p=dashboardData.projects||{},r=dashboardData.regionSummary||{},rep=dashboardData.reports||{};document.getElementById('app').innerHTML=renderHome(e,p,r)+renderEmployees(e)+renderProjects(p)+renderRegions(r)+renderReports(rep,e,p,r)+'<div class="last-updated">🕐 Last updated: '+dashboardData.lastUpdated+'</div>';showPage(currentPage)}

function renderHome(e,p,r){
const ov=p.overdue||[],pl=p.list||[],regs=r.regions||[],t=p.total||0,tp=regs.reduce((s,r)=>s+r.uniquePlaces,0),wd=(p.midTerm||0)+(p.terminalReport||0)+(p.expired||0)+(p.onTheWay||0);
return '<div id="page-home" class="page active">'+
'<div class="stats-grid">'+
'<div class="stat-card"><div class="stat-title">👥 Total Employees</div><div class="stat-value">'+(e.total||0)+'</div><div class="stat-sub">Head: '+(e.headOffice||0)+' | Branch: '+(e.branchOffice||0)+'</div></div>'+
'<div class="stat-card"><div class="stat-title">📋 Total Projects</div><div class="stat-value">'+t+'</div><div class="stat-sub">'+(r.totalRegions||0)+' regions</div></div>'+
'<div class="stat-card"><div class="stat-title">🔴 Expired</div><div class="stat-value" style="color:'+(ov.length>0?'#f44336':'#4caf50')+'">'+ov.length+'</div><div class="stat-sub">>5 years</div></div>'+
'<div class="stat-card"><div class="stat-title">🟠 On The Way</div><div class="stat-value" style="color:#ff9800">'+(p.onTheWay||0)+'</div><div class="stat-sub">In progress</div></div>'+
'<div class="stat-card"><div class="stat-title">📍 Places</div><div class="stat-value">'+tp+'</div><div class="stat-sub">Project sites</div></div>'+
'</div>'+
'<div class="table-container"><div class="table-title">📊 Project Summary by Status<div class="legend-box"><span class="legend-item"><span style="color:#2196f3">●</span> Mid Term (~2.5 yrs)</span><span class="legend-item"><span style="color:#4caf50">●</span> Terminal (~5 yrs)</span><span class="legend-item"><span style="color:#f44336">●</span> Expired (>5 yrs)</span><span class="legend-item"><span style="color:#ff9800">●</span> On The Way (<2.5 yrs)</span></div></div>'+
'<table><thead><tr><th>Status</th><th>Count</th><th>%</th><th>Distribution</th></tr></thead><tbody>'+
'<tr><td><span class="status-badge status-mid-term">Mid Term</span></td><td class="text-blue">'+(p.midTerm||0)+'</td><td>'+(wd?Math.round((p.midTerm||0)/wd*100):0)+'%</td><td><div class="progress-bar"><div class="progress-fill" style="width:'+(wd?Math.round((p.midTerm||0)/wd*100):0)+'%;background:#2196f3"></div></div></td></tr>'+
'<tr><td><span class="status-badge status-terminal-report">Terminal Report</span></td><td class="text-green">'+(p.terminalReport||0)+'</td><td>'+(wd?Math.round((p.terminalReport||0)/wd*100):0)+'%</td><td><div class="progress-bar"><div class="progress-fill" style="width:'+(wd?Math.round((p.terminalReport||0)/wd*100):0)+'%;background:#4caf50"></div></div></td></tr>'+
'<tr><td><span class="status-badge status-expired">Expired</span></td><td class="text-red">'+(p.expired||0)+'</td><td>'+(wd?Math.round((p.expired||0)/wd*100):0)+'%</td><td><div class="progress-bar"><div class="progress-fill" style="width:'+(wd?Math.round((p.expired||0)/wd*100):0)+'%;background:#f44336"></div></div></td></tr>'+
'<tr><td><span class="status-badge status-on-the-way">On The Way</span></td><td class="text-orange">'+(p.onTheWay||0)+'</td><td>'+(wd?Math.round((p.onTheWay||0)/wd*100):0)+'%</td><td><div class="progress-bar"><div class="progress-fill" style="width:'+(wd?Math.round((p.onTheWay||0)/wd*100):0)+'%;background:#ff9800"></div></div></td></tr>'+
'<tr class="total-row"><td><strong>TOTAL (with dates)</strong></td><td><strong>'+wd+'</strong></td><td><strong>100%</strong></td><td></td></tr>'+
((p.noStatus||0)>0?'<tr style="background:#fafafa"><td><span class="status-badge status-no-dates">No Dates</span></td><td style="color:#999">'+(p.noStatus||0)+'</td><td style="color:#999">-</td><td style="color:#999;font-size:11px">Missing signed/end date</td></tr>':'')+
'</tbody></table></div>'+
'<div class="table-container"><div class="table-title">🗺️ Region Summary</div>'+(regs.length>0?'<table><thead><tr><th>Region</th><th>Total</th><th>Places</th><th>%</th></tr></thead><tbody>'+regs.map(r=>'<tr><td><strong>'+r.region+'</strong></td><td><strong>'+r.totalProjects+'</strong></td><td>'+r.uniquePlaces+'</td><td><strong>'+(t?Math.round(r.totalProjects/t*100):0)+'%</strong></td></tr>').join('')+'<tr class="total-row"><td><strong>TOTAL</strong></td><td><strong>'+t+'</strong></td><td><strong>'+tp+'</strong></td><td><strong>100%</strong></td></tr></tbody></table>':'<div class="empty-state">No data</div>')+'</div>'+
'<div class="table-container"><div class="table-title">📋 Recent Projects</div>'+(pl.length>0?'<table><thead><tr><th>S/N</th><th>ET No.</th><th>Project Name</th><th>Place</th><th>Region</th><th>Progress</th><th>Status</th></tr></thead><tbody>'+pl.slice(0,10).map(p=>'<tr class="'+(p.isExpired?'expired-row':'')+'"><td>'+p.sn+'</td><td><strong>'+p.etNo+'</strong></td><td>'+p.projectName+'</td><td>'+(p.projectPlace||'-')+'</td><td>'+p.region+'</td><td>'+p.progressYears+' yrs</td><td><span class="status-badge '+getStatusClass(p.projectStatus)+'">'+p.projectStatus+'</span></td></tr>').join('')+'</tbody></table>':'<div class="empty-state">No projects</div>')+'</div>'+
(ov.length>0?'<div class="table-container"><div class="table-title" style="color:#f44336">⚠️ Expired Agreements ('+ov.length+')</div><table><thead><tr><th>S/N</th><th>ET No.</th><th>Project Name</th><th>Place</th><th>Region</th><th>Agreement End</th></tr></thead><tbody>'+ov.map(p=>'<tr class="expired-row"><td>'+p.sn+'</td><td><strong>'+p.etNo+'</strong></td><td>'+p.projectName+'</td><td>'+(p.projectPlace||'-')+'</td><td>'+p.region+'</td><td class="expired-text">'+p.agreementEndDate+'</td></tr>').join('')+'</tbody></table></div>':'')+
'</div>';
}

function renderEmployees(e){
const l=e.list||[],ec=e.etColors||{};
return '<div id="page-employees" class="page">'+
'<div class="stats-grid"><div class="stat-card"><div class="stat-title">Total</div><div class="stat-value">'+(e.total||0)+'</div></div><div class="stat-card"><div class="stat-title">Head Office</div><div class="stat-value">'+(e.headOffice||0)+'</div></div><div class="stat-card"><div class="stat-title">Branch</div><div class="stat-value">'+(e.branchOffice||0)+'</div></div><div class="stat-card"><div class="stat-title">Active</div><div class="stat-value">'+(e.active||0)+'</div></div><div class="stat-card"><div class="stat-title">Male</div><div class="stat-value">'+(e.male||0)+'</div></div><div class="stat-card"><div class="stat-title">Female</div><div class="stat-value">'+(e.female||0)+'</div></div></div>'+
'<div class="table-container"><div class="table-title">🎨 ET Color Legend</div><div style="display:flex;flex-wrap:wrap;gap:10px">'+Object.entries(ec).map(([n,c])=>'<span style="display:flex;align-items:center;gap:5px;padding:5px 12px;background:#f5f5f5;border-radius:20px;font-size:12px"><span style="width:14px;height:14px;border-radius:50%;background:'+c+'"></span><strong>'+n+'</strong></span>').join('')+'</div></div>'+
'<div class="table-container"><div class="table-title">👥 Employees<span style="font-size:12px;font-weight:400"> Total: '+l.length+'</span></div>'+(l.length>0?'<div class="filter-bar"><input type="text" class="search-input" placeholder="🔍 Search..." onkeyup="filterEmployees()" id="employeeSearch"><select class="filter-select" onchange="filterEmployees()" id="officeFilter"><option value="">All Offices</option><option value="Head Office">Head Office</option><option value="Branch Office">Branch Office</option></select><select class="filter-select" onchange="filterEmployees()" id="empStatusFilter"><option value="">All Statuses</option><option value="Active">Active</option><option value="Inactive">Inactive</option></select></div><div style="overflow-x:auto"><table id="employeesTable"><thead><tr><th>S/N</th><th>ET No.</th><th>Name</th><th>Gender</th><th>Department</th><th>Position</th><th>Office</th><th>Hire Date</th><th>Duration</th><th>Phone</th><th>Email</th><th>Status</th></tr></thead><tbody>'+l.map(emp=>'<tr data-office="'+emp.officeType+'" data-status="'+emp.status+'" style="border-left:4px solid '+emp.etColor+'"><td>'+emp.sn+'</td><td><span class="et-color-dot" style="background:'+emp.etColor+'"></span><strong>'+emp.etNo+'</strong></td><td><strong>'+emp.name+'</strong></td><td>'+emp.gender+'</td><td>'+emp.department+'</td><td>'+emp.position+'</td><td>'+emp.officeType+'</td><td>'+emp.hireDate+'</td><td><span class="duration-text">'+(emp.duration||'-')+'</span></td><td><span class="phone-text">'+(emp.phone||'-')+'</span></td><td>'+(emp.email?'<a href="mailto:'+emp.email+'" class="email-link">'+emp.email+'</a>':'-')+'</td><td><span class="status-badge '+getStatusClass(emp.status)+'">'+emp.status+'</span></td></tr>').join('')+'</tbody></table></div>':'<div class="empty-state">No employees</div>')+'</div></div>';
}

function renderProjects(p){
const l=p.list||[],rgs=[...new Set(l.map(x=>x.region).filter(Boolean))].sort(),sts=['Mid Term','Terminal Report','Expired','On The Way','No Signed Date'];
return '<div id="page-projects" class="page">'+
'<div class="stats-grid"><div class="stat-card"><div class="stat-title">📋 Total</div><div class="stat-value">'+(p.total||0)+'</div></div><div class="stat-card"><div class="stat-title">🔵 Mid Term</div><div class="stat-value" style="color:#2196f3">'+(p.midTerm||0)+'</div><div class="stat-sub">~2.5 yrs</div></div><div class="stat-card"><div class="stat-title">🟢 Terminal</div><div class="stat-value" style="color:#4caf50">'+(p.terminalReport||0)+'</div><div class="stat-sub">~5 yrs</div></div><div class="stat-card"><div class="stat-title">🔴 Expired</div><div class="stat-value" style="color:#f44336">'+(p.expired||0)+'</div><div class="stat-sub">>5 yrs</div></div><div class="stat-card"><div class="stat-title">🟠 On The Way</div><div class="stat-value" style="color:#ff9800">'+(p.onTheWay||0)+'</div><div class="stat-sub"><2.5 yrs</div></div>'+((p.noStatus||0)>0?'<div class="stat-card"><div class="stat-title">⚪ No Dates</div><div class="stat-value" style="color:#999">'+p.noStatus+'</div><div class="stat-sub">Missing dates</div></div>':'')+'</div>'+
'<div class="table-container"><div class="table-title">📋 Projects<span style="font-size:12px;font-weight:400"> Total: '+l.length+'</span></div><div class="filter-bar"><input type="text" class="search-input" placeholder="🔍 Search..." onkeyup="filterProjects()" id="projectSearch"><select class="filter-select" onchange="filterProjects()" id="statusFilter"><option value="">All</option>'+sts.map(s=>'<option value="'+s+'">'+s+'</option>').join('')+'</select><select class="filter-select" onchange="filterProjects()" id="regionFilter"><option value="">All Regions</option>'+rgs.map(r=>'<option value="'+r+'">'+r+'</option>').join('')+'</select></div>'+(l.length>0?'<div style="overflow-x:auto"><table id="projectsTable"><thead><tr><th>S/N</th><th>ET No.</th><th>Project Name</th><th>Place</th><th>Region</th><th>Agreement Signed</th><th>Agreement End</th><th>Signed For</th><th>Progress</th><th>Status</th></tr></thead><tbody>'+l.map(p=>'<tr class="'+(p.isExpired?'expired-row':'')+'" data-status="'+p.projectStatus+'" data-region="'+p.region+'"><td>'+p.sn+'</td><td><strong>'+p.etNo+'</strong></td><td><strong>'+p.projectName+'</strong></td><td>'+(p.projectPlace||'-')+'</td><td>'+p.region+'</td><td>'+p.agreementSignedDate+'</td><td class="'+(p.isExpired?'expired-text':'')+'">'+p.agreementEndDate+(p.isExpired?' ⚠️':'')+'</td><td>'+p.agreementSignedFor+'</td><td>'+p.progressYears+' yrs</td><td><span class="status-badge '+getStatusClass(p.projectStatus)+'">'+p.projectStatus+'</span></td></tr>').join('')+'</tbody></table></div>':'<div class="empty-state">No projects</div>')+'</div></div>';
}

function renderRegions(r){
const regs=r.regions||[],t=r.totalProjects||0,tp=regs.reduce((s,r)=>s+r.uniquePlaces,0);
return '<div id="page-regions" class="page">'+
'<div class="stats-grid"><div class="stat-card"><div class="stat-title">🗺️ Regions</div><div class="stat-value">'+(r.totalRegions||0)+'</div></div><div class="stat-card"><div class="stat-title">📋 Projects</div><div class="stat-value">'+t+'</div></div><div class="stat-card"><div class="stat-title">📍 Places</div><div class="stat-value">'+tp+'</div></div><div class="stat-card"><div class="stat-title">📊 Avg/Region</div><div class="stat-value">'+(r.totalRegions?(t/r.totalRegions).toFixed(1):0)+'</div></div></div>'+
'<div class="table-container"><div class="table-title">🗺️ Region Summary</div>'+(regs.length>0?'<table><thead><tr><th>Region</th><th>Total</th><th>Places</th><th>%</th></tr></thead><tbody>'+regs.map(r=>'<tr><td><strong>'+r.region+'</strong></td><td><strong>'+r.totalProjects+'</strong></td><td>'+r.uniquePlaces+'</td><td><strong>'+(t?Math.round(r.totalProjects/t*100):0)+'%</strong></td></tr>').join('')+'<tr class="total-row"><td><strong>TOTAL</strong></td><td><strong>'+t+'</strong></td><td><strong>'+tp+'</strong></td><td><strong>100%</strong></td></tr></tbody></table>':'<div class="empty-state">No data</div>')+'</div></div>';
}

function renderReports(rep,e,p,r){
const rs=rep.regionStats||[],sd=rep.statusDistribution||[],ds=rep.departmentStats||[],tp=(r.regions||[]).reduce((s,r)=>s+r.uniquePlaces,0);
return '<div id="page-reports" class="page">'+
'<div class="stats-grid"><div class="stat-card"><div class="stat-title">👥 Employees</div><div class="stat-value">'+(rep.totalEmployees||0)+'</div></div><div class="stat-card"><div class="stat-title">📋 Projects</div><div class="stat-value">'+(rep.totalProjects||0)+'</div></div><div class="stat-card"><div class="stat-title">🗺️ Regions</div><div class="stat-value">'+(rs.length||0)+'</div></div><div class="stat-card"><div class="stat-title">⚠️ Expired</div><div class="stat-value" style="color:'+(rep.overdueCount>0?'#f44336':'#4caf50')+'">'+(rep.overdueCount||0)+'</div></div><div class="stat-card"><div class="stat-title">📍 Places</div><div class="stat-value">'+tp+'</div></div><div class="stat-card"><div class="stat-title">🟠 On The Way</div><div class="stat-value">'+(p.onTheWay||0)+'</div></div></div>'+
'<div class="table-container"><div class="table-title">🗺️ Region Distribution</div>'+(rs.length>0?'<table><thead><tr><th>Region</th><th>Projects</th><th>%</th><th>Distribution</th></tr></thead><tbody>'+rs.map(r=>'<tr><td><strong>'+r.region+'</strong></td><td><strong>'+r.projectCount+'</strong></td><td>'+r.percentage+'%</td><td><div class="progress-bar"><div class="progress-fill" style="width:'+r.percentage+'%"></div></div></td></tr>').join('')+'</tbody></table>':'<div class="empty-state">No data</div>')+'</div>'+
'<div class="table-container"><div class="table-title">📊 Status Distribution</div>'+(sd.length>0?'<table><thead><tr><th>Status</th><th>Count</th><th>%</th><th>Distribution</th></tr></thead><tbody>'+sd.map(s=>'<tr><td><span class="status-badge '+getStatusClass(s.status)+'">'+s.status+'</span></td><td><strong>'+s.count+'</strong></td><td>'+s.percentage+'%</td><td><div class="progress-bar"><div class="progress-fill" style="width:'+s.percentage+'%"></div></div></td></tr>').join('')+'</tbody></table>':'<div class="empty-state">No data</div>')+'</div>'+
'<div class="table-container"><div class="table-title">🏢 Departments</div>'+(ds.length>0?'<table><thead><tr><th>Department</th><th>Employees</th><th>%</th></tr></thead><tbody>'+ds.map(d=>'<tr><td><strong>'+d.name+'</strong></td><td>'+d.employeeCount+'</td><td>'+d.percentage+'%</td></tr>').join('')+'</tbody></table>':'<div class="empty-state">No data</div>')+'</div></div>';
}

function filterEmployees(){
const t=document.getElementById('employeesTable');if(!t)return;
const s=(document.getElementById('employeeSearch')?.value||'').toLowerCase();
const o=document.getElementById('officeFilter')?.value||'';
const st=document.getElementById('empStatusFilter')?.value||'';
t.querySelectorAll('tbody tr').forEach(r=>{r.style.display=(!s||r.textContent.toLowerCase().includes(s))&&(!o||r.getAttribute('data-office')===o)&&(!st||r.getAttribute('data-status')===st)?'':'none'});}

function filterProjects(){
const t=document.getElementById('projectsTable');if(!t)return;
const s=(document.getElementById('projectSearch')?.value||'').toLowerCase();
const sf=document.getElementById('statusFilter')?.value||'';
const rf=document.getElementById('regionFilter')?.value||'';
t.querySelectorAll('tbody tr').forEach(r=>{r.style.display=(!s||r.textContent.toLowerCase().includes(s))&&(!sf||r.getAttribute('data-status')===sf)&&(!rf||r.getAttribute('data-region')===rf)?'':'none'});}

function showPage(pn){
currentPage=pn;
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
const sp=document.getElementById('page-'+pn);if(sp)sp.classList.add('active');
document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('active');if(b.textContent.toLowerCase().includes(pn.toLowerCase()))b.classList.add('active')});
window.scrollTo({top:0,behavior:'smooth'});}

document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='r'){e.preventDefault();refreshData()}});
</script>
</body>
</html>
